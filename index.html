<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Countdown</title>

<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #f5f5f5;
        gap: 30px;
    }

    #text {
        font-size: 42px; /* 🔥 più grande */
        text-align: center;
        max-width: 700px;
        line-height: 1.4;
    }

    #nextBtn {
        display: none;
        padding: 20px 40px;
        font-size: 22px;
        border: none;
        border-radius: 15px;
        background: linear-gradient(135deg, #ff4d6d, #ff758f);
        color: white;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        transition: transform 0.2s ease;
    }

    #nextBtn:hover {
        transform: scale(1.05);
    }
</style>
</head>

<body>

<div id="text"></div>
<button id="nextBtn">Timer per la prossima ⏭</button><script>
const text = document.getElementById("text");
const nextBtn = document.getElementById("nextBtn");

const TOKEN = "TUO_TOKEN";
const CHAT_ID = "TUO_CHAT_ID";

const events = [
    {
        date: new Date('2026-04-30T19:37:00+02:00'),
        message: "Prima frase 💌"
    },
    {
        date: new Date('2026-04-30T19:38:00+02:00'),
        message: "Seconda frase 🌙"
    }
];

let currentIndex = 0;
let unlocked = false; // 🔥 stato del singolo step

function getTimeRemaining(target) {
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) return null;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    return `${days} giorni, ${hours} ore, ${minutes} minuti e ${seconds} secondi`;
}

function update() {
    if (currentIndex >= events.length) {
        text.textContent = "Fine 💫";
        nextBtn.style.display = "none";
        return;
    }

    const event = events[currentIndex];

    // 🔥 SE NON SBLOCCATO → countdown
    if (!unlocked) {
        const timeLeft = getTimeRemaining(event.date);

        if (timeLeft) {
            text.textContent = `Prossimo messaggio tra ${timeLeft}`;
            nextBtn.style.display = "none";
        } else {
            unlocked = true; // 🔥 blocca lo stato
        }
    }

    // 🔥 SE SBLOCCATO → frase + bottone
    if (unlocked) {
        text.textContent = event.message;
        nextBtn.style.display = "inline-block";
    }
}

// CLICK → notifica + prossimo step
nextBtn.addEventListener("click", () => {

    // 🔔 notifica
    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: `Ha letto il messaggio ${currentIndex + 1} 💖`
        })
    });

    // prossimo
    currentIndex++;
    unlocked = false; // 🔥 reset stato
    update();
});

setInterval(update, 1000);
update();
</script>
