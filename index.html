// 🔁 Stato
let currentIndex = 0;
let unlocked = false;
let unlockTime = null;

// 🔐 Carica stato salvato
const savedIndex = localStorage.getItem("currentIndex");
const savedEvents = localStorage.getItem("events");

if (savedIndex !== null) currentIndex = parseInt(savedIndex);

if (savedEvents) {
    const parsed = JSON.parse(savedEvents);
    parsed.forEach((e, i) => {
        events[i].date = new Date(e.date);
    });
}

// ⏱ Countdown
function getTimeRemaining(target) {
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) return null;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    return `${days} giorni, ${hours} ore, ${minutes} minuti e ${seconds} secondi`;
}

// 🔄 Update
function update() {
    if (currentIndex >= events.length) {
        text.textContent = "Fine 💫";
        nextBtn.style.display = "none";
        return;
    }

    const event = events[currentIndex];
    const now = new Date();

    // 🔒 Countdown
    if (!unlocked) {
        const timeLeft = getTimeRemaining(event.date);

        if (timeLeft) {
            text.textContent = `Prossimo messaggio tra ${timeLeft}`;
            nextBtn.style.display = "none";
        } else {
            unlocked = true;
            unlockTime = new Date();
        }
    }

    // ⏱ Se passano 12 ore senza click
    if (unlocked && unlockTime && (now - unlockTime > 12 * 60 * 60 * 1000)) {

        if (events[currentIndex + 1]) {
            events[currentIndex + 1].date = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
        }

        // 🔔 Notifica mancata lettura
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: `Non ha letto il messaggio ${currentIndex + 1} entro 12 ore 😅`
            })
        });

        currentIndex++;
        unlocked = false;
        unlockTime = null;

        // 💾 Salva
        localStorage.setItem("currentIndex", currentIndex);
        localStorage.setItem("events", JSON.stringify(events));

        return;
    }

    // 💌 Mostra frase
    if (unlocked) {
        text.textContent = event.message;
        nextBtn.style.display = "inline-block";
        nextBtn.disabled = false;
    }
}

// 👉 CLICK
nextBtn.addEventListener("click", () => {

    // 🔒 Anti spam
    nextBtn.disabled = true;

    // 🔔 Notifica lettura con orario
    const now = new Date().toLocaleString();

    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: `Ha letto il messaggio ${currentIndex + 1} alle ${now} 💖`
        })
    });

    // ➡️ Prossimo
    currentIndex++;
    unlocked = false;
    unlockTime = null;

    // 💾 Salva
    localStorage.setItem("currentIndex", currentIndex);
    localStorage.setItem("events", JSON.stringify(events));

    update();
});

// 🔁 Loop
setInterval(update, 1000);
update();
