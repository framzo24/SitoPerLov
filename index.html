<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Countdown</title>

<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #f5f5f5;
    }

    #text {
        font-size: 30px;
        text-align: center;
    }
</style>
</head>

<body>

<div id="text"></div>

<script>
const text = document.getElementById("text");

// 🔥 METTI QUI LA DATA
const targetDate = new Date("2026-04-30T18:40:00+02:00");

// funzione countdown
function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
        text.textContent = "Forse non te ne accorgi, ma ogni giorno cerco di fare lo stesso cioè trovare modi per farti sentire bene, al sicuro, bella e veramente amata. Non so se lo faccio sempre giusto, ma quelle saranno per sempre le mie intenzioni.";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    text.textContent = `${days} giorni, ${hours} ore, ${minutes} minuti e ${seconds} secondi`;
}

// aggiorna ogni secondo
setInterval(updateCountdown, 1000);

// avvio immediato
updateCountdown();
</script>

</body>
</html>
